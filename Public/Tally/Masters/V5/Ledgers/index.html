    <!-- <script src="https://keshavsoft.com/cdn/KsTable/V7/kstable.js"></script> -->

    <script>
        (function () {
            function loadFromCDN() {
                console.log("⚠️ KSTable not found, loading from CDN...");

                const script = document.createElement("script");
                script.src = "https://keshavsoft.com/cdn/KsTable/V8/kstable.js";

                script.onload = () => {
                    console.log("✅ KSTable loaded from CDN");
                };

                document.head.appendChild(script);
            }

            // Wait a little for extension injection
            setTimeout(() => {
                if (!window.KSTable) {
                    loadFromCDN();
                } else {
                    console.log("✅ KSTable from extension");
                }
            }, 1000); // small delay for extension
        })();
    </script>

    <script type="module" src="./Index/start.js"></script>
</body>

</html>
