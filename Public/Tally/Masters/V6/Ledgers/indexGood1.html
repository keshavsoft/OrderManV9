<!DOCTYPE html>

<head>

    <title>KeshavSoft</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Heroicons (SVG inline, no extra CDN needed) -->

    <style>
        mark {

hover:bg-gray-600 active:bg-gray-500 active:scale-95 
transition-all duration-150 md:flex-col md:justify-center md:items-center">

hover:bg-gray-600 active:bg-gray-500 active:scale-95 
transition-all duration-150 md:flex-col md:justify-center md:items-center">
