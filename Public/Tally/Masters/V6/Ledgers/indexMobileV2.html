<!DOCTYPE html>
<html lang="en">

<head>

    <title>KeshavSoft</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Heroicons (SVG inline, no extra CDN needed) -->

    <style>
        mark {
            background-color: yellow;
            color: black;

</head>

<body class="bg-gray-100 flex flex-col min-h-screen">

                <div class="flex items-center justify-between">

                </div>

                <!-- collapsible menu -->
                <ul id="mobileMenu" class="hidden flex flex-col space-y-4 mt-4">

                    <li>
                        <a href="#" class="flex justify-between items-center bg-gray-700 px-3 py-2 rounded-md 
hover:bg-gray-600 active:bg-gray-500 
transition-all duration-150 
shadow-sm hover:shadow-md">

                            <svg class="w-5 h-5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">

transition-all duration-150">

                                <path d="M3 7l9 4 9-4M3 7l9-4 9 4M3 7v10l9 4 9-4V7" />
