                            <!-- Auto generate via simple JS -->
                            <script>
                                const tbody = document.currentScript.parentElement;
                                for (let i = 2; i <= 100; i++) {
                                    const row = document.createElement('tr');
                                    row.className = "hover:bg-gray-50";
                                    row.innerHTML = `
                                <td class="px-4 py-2">${i}</td>
                                <td class="px-4 py-2">Ledger ${i}</td>
                                <td class="px-4 py-2">Type ${i % 5}</td>
                                <td class="px-4 py-2">₹${(i * 137).toLocaleString()}</td>
                                <td class="px-4 py-2 ${i % 2 === 0 ? 'text-green-600' : 'text-red-600'}">
                                    ${i % 2 === 0 ? 'Active' : 'Inactive'}
                                </td>
                                <td class="px-4 py-2 whitespace-nowrap">
                                    This is a heavy column with extended content to test horizontal scrolling and layout stability across devices.
                                </td>
